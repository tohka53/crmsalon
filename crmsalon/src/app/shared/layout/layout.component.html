<div class="min-h-screen flex flex-col">
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <a class="flex items-center gap-2" [routerLink]="auth.homeRoute()">
            <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-brand-600 text-white text-lg">💇‍♀️</span>
            <span class="font-bold text-lg text-slate-800">CRM <span class="text-brand-600">Salón</span></span>
          </a>
          <div class="hidden md:flex items-center gap-1" *ngIf="user$ | async as user">
            <a
              *ngFor="let item of navItems(user.role)"
              [routerLink]="item.link"
              routerLinkActive="bg-brand-50 text-brand-700"
              [routerLinkActiveOptions]="{ exact: !!item.exact }"
              class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors"
            >
              <span class="mr-1">{{ item.icon }}</span>{{ item.label }}
            </a>
          </div>
        </div>

        <div class="flex items-center gap-3" *ngIf="user$ | async as user">
          <div class="hidden sm:flex flex-col items-end leading-tight">
            <span class="text-sm font-semibold text-slate-800">{{ user.nombre }}</span>
            <span class="text-xs text-slate-500">{{ roleLabel[user.role] }}</span>
          </div>
          <span
            class="inline-flex h-9 w-9 items-center justify-center rounded-full text-white text-sm font-semibold"
            [style.background-color]="user.color || '#db2777'"
            >{{ iniciales(user.nombre) }}</span
          >
          <button
            (click)="logout()"
            title="Cerrar sesión"
            class="px-3 py-2 rounded-lg text-sm font-medium text-slate-600 hover:bg-red-50 hover:text-red-600 transition-colors"
          >
            Salir
          </button>
        </div>
      </div>

      <div class="md:hidden flex items-center gap-1 pb-3 overflow-x-auto" *ngIf="user$ | async as user">
        <a
          *ngFor="let item of navItems(user.role)"
          [routerLink]="item.link"
          routerLinkActive="bg-brand-50 text-brand-700"
          [routerLinkActiveOptions]="{ exact: !!item.exact }"
          class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 whitespace-nowrap"
        >
          {{ item.icon }} {{ item.label }}
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 py-6">
    <router-outlet></router-outlet>
  </main>
</div>
