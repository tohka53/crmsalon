<div class="max-w-3xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">Asignar servicio</h1>
    <p class="text-sm text-slate-500">Selecciona el cliente, el estilista y los servicios a realizar.</p>
  </div>

  <div *ngIf="exito" class="flex items-center gap-2 rounded-lg bg-green-50 px-4 py-3 text-sm text-green-700 border border-green-100">
    <span>✅</span> {{ exito }}
  </div>

  <div class="rounded-xl bg-white shadow-sm border border-slate-100 p-6 space-y-6">
    <!-- Cliente + estilista -->
    <div class="grid sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Cliente</label>
        <select [(ngModel)]="clienteId"
                class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none bg-white">
          <option value="" disabled>Selecciona un cliente…</option>
          <option *ngFor="let c of clientes" [value]="c.id">{{ c.nombre }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Estilista</label>
        <select [(ngModel)]="estilistaId"
                class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none bg-white">
          <option value="" disabled>Selecciona un estilista…</option>
          <option *ngFor="let e of estilistas" [value]="e.id">{{ e.nombre }}</option>
        </select>
      </div>
    </div>

    <!-- Servicios: multi-select con buscador -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">
        Servicios <span class="text-slate-400 font-normal">(selección múltiple)</span>
      </label>

      <!-- Chips seleccionados -->
      <div *ngIf="serviciosSeleccionados.length" class="flex flex-wrap gap-2 mb-3">
        <span *ngFor="let s of serviciosSeleccionados"
              class="inline-flex items-center gap-1 rounded-full bg-brand-100 px-3 py-1 text-sm text-brand-700">
          {{ s.icono }} {{ s.nombre }}
          <button type="button" (click)="quitar(s.id)" class="ml-0.5 text-brand-500 hover:text-brand-800">✕</button>
        </span>
      </div>

      <!-- Buscador -->
      <div class="relative mb-2">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
        <input type="text" [(ngModel)]="busqueda" placeholder="Buscar servicio (peinado, tinte, cejas…)"
               class="w-full rounded-lg border border-slate-300 pl-9 pr-3 py-2.5 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none" />
      </div>

      <!-- Lista filtrable -->
      <div class="grid sm:grid-cols-2 gap-2">
        <button *ngFor="let s of filtrados" type="button" (click)="toggle(s.id)"
                class="flex items-center justify-between rounded-lg border px-3 py-2.5 text-sm transition-colors text-left"
                [class.border-brand-500]="isSel(s.id)"
                [class.bg-brand-50]="isSel(s.id)"
                [class.border-slate-200]="!isSel(s.id)"
                [class.hover:bg-slate-50]="!isSel(s.id)">
          <span class="flex items-center gap-2">
            <span class="text-lg">{{ s.icono }}</span>
            <span>
              <span class="font-medium text-slate-700 block">{{ s.nombre }}</span>
              <span class="text-xs text-slate-400">Q{{ s.precio }} · {{ s.duracion }} min</span>
            </span>
          </span>
          <span class="inline-flex h-5 w-5 items-center justify-center rounded-md border text-xs"
                [class.bg-brand-600]="isSel(s.id)" [class.border-brand-600]="isSel(s.id)"
                [class.text-white]="isSel(s.id)" [class.border-slate-300]="!isSel(s.id)">
            <span *ngIf="isSel(s.id)">✓</span>
          </span>
        </button>
        <p *ngIf="filtrados.length === 0" class="col-span-full text-center text-sm text-slate-400 py-4">
          No se encontraron servicios para “{{ busqueda }}”.
        </p>
      </div>
    </div>

    <!-- Notas -->
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Notas <span class="text-slate-400 font-normal">(opcional)</span></label>
      <textarea [(ngModel)]="notas" rows="2" placeholder="Ej. tono rubio ceniza, alergias, preferencias…"
                class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none"></textarea>
    </div>

    <!-- Resumen + submit -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 border-t border-slate-100 pt-4">
      <div class="text-sm text-slate-600">
        <span class="font-semibold text-slate-800">{{ seleccionados.size }}</span> servicio(s) ·
        Total <span class="font-semibold text-slate-800">Q{{ total }}</span> ·
        <span class="text-slate-500">{{ duracion }} min</span>
      </div>
      <button (click)="asignar()" [disabled]="!valido"
              class="rounded-lg px-5 py-2.5 text-sm font-semibold text-white transition-colors"
              [class.bg-brand-600]="valido" [class.hover:bg-brand-700]="valido"
              [class.bg-slate-300]="!valido" [class.cursor-not-allowed]="!valido">
        Asignar servicio
      </button>
    </div>
  </div>
</div>
