<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-600 via-brand-500 to-purple-600 px-4 py-10">
  <div class="w-full max-w-md">
    <div class="text-center mb-6">
      <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-white/20 backdrop-blur text-3xl mb-3">💇‍♀️</div>
      <h1 class="text-3xl font-bold text-white">CRM Salón</h1>
      <p class="text-white/80 text-sm mt-1">Gestión de servicios de belleza</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8">
      <h2 class="text-xl font-semibold text-slate-800 mb-5">Iniciar sesión</h2>

      <div *ngIf="error" class="mb-4 flex items-center gap-2 rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700">
        <span>⚠️</span><span>{{ error }}</span>
      </div>

      <form (ngSubmit)="submit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Correo</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            autocomplete="username"
            placeholder="tucorreo@salon.com"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            placeholder="••••••"
            class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-200 outline-none"
          />
        </div>
        <button
          type="submit"
          class="w-full rounded-lg bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 transition-colors"
        >
          Entrar
        </button>
      </form>

      <div class="mt-6">
        <p class="text-center text-xs text-slate-400 mb-3">— Acceso rápido (demo) —</p>
        <div class="grid grid-cols-3 gap-2">
          <button
            *ngFor="let d of demos"
            (click)="usarDemo(d.email)"
            class="flex flex-col items-center gap-1 rounded-lg border border-slate-200 py-3 text-xs font-medium text-slate-600 hover:border-brand-300 hover:bg-brand-50 transition-colors"
          >
            <span class="inline-flex h-7 w-7 items-center justify-center rounded-full text-white" [style.background-color]="d.color">{{ d.role[0] }}</span>
            {{ d.role }}
          </button>
        </div>
        <p class="text-center text-xs text-slate-400 mt-3">Contraseña de todos: <span class="font-mono">123456</span></p>
      </div>
    </div>
  </div>
</div>
